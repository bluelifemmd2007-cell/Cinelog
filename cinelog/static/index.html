<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CineLog — Your Watch Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F4ED;
    --paper-raised: #FFFFFF;
    --ink: #23211D;
    --ink-soft: #6B6660;
    --rule: #DDD7C8;
    --burgundy: #8C2F39;
    --burgundy-soft: #F3E2E1;
    --ochre: #C99A3B;
    --sidebar: #23211D;
    --sidebar-text: #E8E3D6;
    --sidebar-text-dim: #8B8678;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .layout {
    display: flex;
    min-height: 100vh;
  }

  
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar);
    color: var(--sidebar-text);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .masthead {
    font-family: 'Source Serif 4', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .masthead-rule {
    width: 36px;
    height: 2px;
    background: var(--ochre);
    margin: 10px 0 8px;
  }
  .masthead-sub {
    font-size: 12px;
    color: var(--sidebar-text-dim);
    line-height: 1.5;
    margin-bottom: 36px;
  }

  .nav-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--sidebar-text-dim);
    margin-bottom: 10px;
  }

  .nav-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    color: var(--sidebar-text-dim);
    margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--sidebar-text); }
  .nav-item.active {
    background: rgba(255,255,255,0.08);
    color: var(--sidebar-text);
    border-left: 2px solid var(--ochre);
    padding-left: 10px;
  }
  .nav-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--sidebar-text-dim);
  }

  .sidebar-spacer { flex: 1; }

  .ai-recommend-btn {
    background: var(--ochre);
    color: #23211D;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    margin-top: 24px;
  }
  .ai-recommend-btn:hover { background: #DCAE4C; }
  .ai-recommend-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  
  .main {
    flex: 1;
    padding: 40px 48px;
    max-width: 760px;
  }

  .search-block {
    margin-bottom: 36px;
  }
  .search-row {
    display: flex;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 10px;
  }
  .search-row input {
    flex: 1;
    border: none;
    background: none;
    font-family: 'Source Serif 4', serif;
    font-size: 22px;
    color: var(--ink);
    padding: 4px 0;
  }
  .search-row input::placeholder { color: var(--ink-soft); font-style: italic; }
  .search-row input:focus { outline: none; }
  .search-row button {
    background: none;
    border: none;
    color: var(--burgundy);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: pointer;
    padding: 0 4px;
  }

  .search-dropdown {
    margin-top: 4px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--paper-raised);
    overflow: hidden;
    display: none;
  }
  .search-dropdown.active { display: block; }

  .search-result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
  }
  .search-result-row:last-child { border-bottom: none; }
  .search-result-row img {
    width: 34px;
    height: 51px;
    object-fit: cover;
    border-radius: 3px;
    background: var(--rule);
    flex-shrink: 0;
  }
  .search-result-info { flex: 1; min-width: 0; }
  .search-result-title { font-weight: 600; font-size: 14px; }
  .search-result-meta { font-size: 11.5px; color: var(--ink-soft); text-transform: capitalize; }
  .search-add-btn {
    background: none;
    border: 1px solid var(--burgundy);
    color: var(--burgundy);
    border-radius: 6px;
    padding: 6px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  .search-add-btn:hover { background: var(--burgundy); color: white; }
  .search-add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .search-empty-row {
    padding: 16px;
    color: var(--ink-soft);
    font-size: 13px;
    text-align: center;
  }

  .error-banner {
    display: none;
    background: var(--burgundy-soft);
    border-left: 3px solid var(--burgundy);
    color: var(--burgundy);
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    border-radius: 0 6px 6px 0;
  }
  .error-banner.active { display: block; }

  .section-title {
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
  }

  
  .entries { display: flex; flex-direction: column; }

  .entry-row {
    display: flex;
    gap: 18px;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  .entry-row:first-child { padding-top: 0; }

  .entry-thumb {
    width: 56px;
    height: 84px;
    object-fit: cover;
    border-radius: 4px;
    background: var(--rule);
    flex-shrink: 0;
  }

  .entry-main { flex: 1; min-width: 0; }

  .entry-top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .entry-title {
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    font-weight: 600;
  }
  .entry-year-type {
    font-size: 12px;
    color: var(--ink-soft);
    text-transform: capitalize;
  }

  .entry-rating {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    color: var(--ochre);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .entry-rating.empty { color: var(--ink-soft); font-size: 12px; font-weight: 400; }

  .entry-genres {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin: 4px 0 10px;
  }
  .entry-genres span:not(:last-child)::after { content: " · "; }

  .entry-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-pills { display: flex; gap: 6px; }
  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    cursor: pointer;
    background: none;
  }
  .status-pill.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .rating-input-inline {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-left: auto;
  }
  .rating-input-inline input {
    width: 44px;
    border: 1px solid var(--rule);
    border-radius: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 4px 6px;
    text-align: center;
    background: var(--paper-raised);
  }
  .rating-input-inline input:focus { outline: none; border-color: var(--ochre); }
  .rating-input-inline span { font-size: 11px; color: var(--ink-soft); }

  .remove-link {
    font-size: 11px;
    color: var(--ink-soft);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--rule);
  }
  .remove-link:hover { color: var(--burgundy); text-decoration-color: var(--burgundy); }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    padding: 70px 20px;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
  }

  
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(35, 33, 29, 0.55);
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 24px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--paper-raised);
    border-radius: 14px;
    padding: 36px;
    width: 600px;
    max-width: 100%;
    max-height: 82vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Source Serif 4', serif;
    font-size: 24px;
    margin: 0 0 4px;
  }
  .modal .taste-summary {
    font-size: 13.5px;
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: 24px;
    line-height: 1.6;
    border-left: 2px solid var(--ochre);
    padding-left: 14px;
  }

  .rec-row {
    display: flex;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule);
  }
  .rec-row:last-child { border-bottom: none; }
  .rec-row img {
    width: 50px;
    height: 75px;
    object-fit: cover;
    border-radius: 4px;
    background: var(--rule);
    flex-shrink: 0;
  }
  .rec-title { font-family: 'Source Serif 4', serif; font-weight: 600; font-size: 16px; }
  .rec-meta { font-size: 11px; color: var(--ink-soft); text-transform: capitalize; margin-bottom: 6px; }
  .rec-reason { font-size: 13px; line-height: 1.55; color: var(--ink); }

  .modal-close-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .modal-loading, .modal-error {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 36px 0;
  }
  .modal-error { color: var(--burgundy); }

  @media (max-width: 760px) {
    .sidebar { display: none; }
    .main { padding: 24px; max-width: 100%; }
  }
</style>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="masthead">CineLog</div>
    <div class="masthead-rule"></div>
    <div class="masthead-sub">A running record of what you've watched, and what's worth watching next.</div>

    <div class="nav-section-label">Shelves</div>
    <div class="nav-item active" data-status="">All Entries <span class="nav-count" id="count-all"></span></div>
    <div class="nav-item" data-status="want_to_watch">Want to Watch <span class="nav-count" id="count-want"></span></div>
    <div class="nav-item" data-status="watching">Currently Watching <span class="nav-count" id="count-watching"></span></div>
    <div class="nav-item" data-status="watched">Watched <span class="nav-count" id="count-watched"></span></div>

    <div class="sidebar-spacer"></div>

    <button class="ai-recommend-btn" id="ai-btn">Suggest What's Next</button>
  </aside>

  <main class="main">

    <div class="search-block">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search for a title to add to your journal…" />
        <button id="search-btn">Search</button>
      </div>
      <div class="search-dropdown" id="search-dropdown"></div>
    </div>

    <div class="error-banner" id="error-box"></div>

    <div class="section-title" id="section-title">All Entries</div>
    <div class="entries" id="entries"></div>

  </main>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>What to watch next</h2>
    <div id="modal-content"></div>
    <button class="modal-close-btn" id="modal-close-btn">Close</button>
  </div>
</div>

<script>
  const API_BASE = "http://127.0.0.1:8000";
  let currentStatusFilter = "";
  let allItemsCache = [];

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function showError(message) {
    const box = document.getElementById('error-box');
    box.textContent = message;
    box.classList.add('active');
  }
  function clearError() {
    document.getElementById('error-box').classList.remove('active');
  }

  
  async function doSearch() {
    clearError();
    const query = document.getElementById('search-input').value.trim();
    const dropdown = document.getElementById('search-dropdown');
    if (!query) {
      dropdown.classList.remove('active');
      return;
    }

    dropdown.classList.add('active');
    dropdown.innerHTML = '<div class="search-empty-row">Searching…</div>';

    try {
      const res = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(query)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Search failed.');

      if (data.results.length === 0) {
        dropdown.innerHTML = '<div class="search-empty-row">No results found.</div>';
        return;
      }

      dropdown.innerHTML = '';
      data.results.slice(0, 7).forEach(item => {
        const row = document.createElement('div');
        row.className = 'search-result-row';
        row.innerHTML = `
          <img src="${item.poster_url || ''}" onerror="this.style.visibility='hidden'" />
          <div class="search-result-info">
            <div class="search-result-title">${escapeHtml(item.title)}</div>
            <div class="search-result-meta">${item.media_type} · ${item.release_year || 'N/A'}</div>
          </div>
          <button class="search-add-btn">Add</button>
        `;
        row.querySelector('.search-add-btn').addEventListener('click', (e) => addItem(item, e.target));
        dropdown.appendChild(row);
      });
    } catch (err) {
      showError(err.message);
      dropdown.innerHTML = '';
      dropdown.classList.remove('active');
    }
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doSearch();
  });

  async function addItem(item, buttonEl) {
    clearError();
    buttonEl.disabled = true;
    buttonEl.textContent = '…';
    try {
      const res = await fetch(`${API_BASE}/api/watchlist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tmdb_id: item.tmdb_id, media_type: item.media_type, status: 'want_to_watch' })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to add item.');
      buttonEl.textContent = 'Added';
      document.getElementById('search-input').value = '';
      document.getElementById('search-dropdown').classList.remove('active');
      await loadWatchlist();
    } catch (err) {
      showError(err.message);
      buttonEl.disabled = false;
      buttonEl.textContent = 'Add';
    }
  }


  const sectionTitles = {
    "": "All Entries",
    "want_to_watch": "Want to Watch",
    "watching": "Currently Watching",
    "watched": "Watched"
  };

  document.querySelectorAll('.nav-item').forEach(navItem => {
    navItem.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      navItem.classList.add('active');
      currentStatusFilter = navItem.dataset.status;
      document.getElementById('section-title').textContent = sectionTitles[currentStatusFilter];
      renderEntries(filterCachedItems());
    });
  });

  function filterCachedItems() {
    if (!currentStatusFilter) return allItemsCache;
    return allItemsCache.filter(i => i.status === currentStatusFilter);
  }

  function updateCounts() {
    document.getElementById('count-all').textContent = allItemsCache.length || '';
    document.getElementById('count-want').textContent = allItemsCache.filter(i => i.status === 'want_to_watch').length || '';
    document.getElementById('count-watching').textContent = allItemsCache.filter(i => i.status === 'watching').length || '';
    document.getElementById('count-watched').textContent = allItemsCache.filter(i => i.status === 'watched').length || '';
  }


  async function loadWatchlist() {
    clearError();
    try {
      const res = await fetch(`${API_BASE}/api/watchlist`);
      const items = await res.json();
      allItemsCache = items;
      updateCounts();
      renderEntries(filterCachedItems());
    } catch (err) {
      showError('Could not load your journal. Is the backend running?');
    }
  }

  function renderEntries(items) {
    const container = document.getElementById('entries');
    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state">Nothing on this shelf yet.</div>';
      return;
    }
    container.innerHTML = '';
    items.forEach(item => container.appendChild(renderEntryRow(item)));
  }

  function renderEntryRow(item) {
    const row = document.createElement('div');
    row.className = 'entry-row';

    const statuses = [
      { value: 'want_to_watch', label: 'Want' },
      { value: 'watching', label: 'Watching' },
      { value: 'watched', label: 'Watched' }
    ];

    const ratingDisplay = item.user_rating
      ? `<span class="entry-rating">${item.user_rating}/10</span>`
      : `<span class="entry-rating empty">unrated</span>`;

    row.innerHTML = `
      <img class="entry-thumb" src="${item.poster_url || ''}" onerror="this.style.visibility='hidden'" />
      <div class="entry-main">
        <div class="entry-top-row">
          <div>
            <span class="entry-title">${escapeHtml(item.title)}</span>
            <span class="entry-year-type"> · ${item.media_type} · ${item.release_year || 'N/A'}</span>
          </div>
          ${ratingDisplay}
        </div>
        <div class="entry-genres">${item.genres.map(g => `<span>${escapeHtml(g)}</span>`).join('')}</div>
        <div class="entry-controls">
          <div class="status-pills">
            ${statuses.map(s => `<button class="status-pill ${s.value === item.status ? 'active' : ''}" data-value="${s.value}">${s.label}</button>`).join('')}
          </div>
          <div class="rating-input-inline">
            <input type="number" min="1" max="10" placeholder="—" value="${item.user_rating || ''}" />
            <span>/10</span>
          </div>
          <span class="remove-link">Remove</span>
        </div>
      </div>
    `;

    row.querySelectorAll('.status-pill').forEach(pill => {
      pill.addEventListener('click', () => updateItem(item.id, { status: pill.dataset.value }));
    });

    const ratingInput = row.querySelector('.rating-input-inline input');
    ratingInput.addEventListener('change', () => {
      const val = parseInt(ratingInput.value);
      if (val >= 1 && val <= 10) updateItem(item.id, { user_rating: val });
    });

    row.querySelector('.remove-link').addEventListener('click', () => deleteItem(item.id));

    return row;
  }

  async function updateItem(id, payload) {
    clearError();
    try {
      const res = await fetch(`${API_BASE}/api/watchlist/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.detail || 'Update failed.');
      }
      await loadWatchlist();
    } catch (err) {
      showError(err.message);
    }
  }

  async function deleteItem(id) {
    clearError();
    try {
      await fetch(`${API_BASE}/api/watchlist/${id}`, { method: 'DELETE' });
      await loadWatchlist();
    } catch (err) {
      showError('Failed to remove item.');
    }
  }

  // --- AI Recommendations ---
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('ai-btn').addEventListener('click', async () => {
    overlay.classList.add('active');
    const content = document.getElementById('modal-content');
    content.innerHTML = '<div class="modal-loading">Reading through your ratings…</div>';

    try {
      const res = await fetch(`${API_BASE}/api/recommend`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Could not generate recommendations.');

      let html = `<div class="taste-summary">${escapeHtml(data.based_on_summary)}</div>`;
      if (data.recommendations.length === 0) {
        html += '<div class="modal-loading">No verified recommendations this time — try rating a few more titles.</div>';
      } else {
        data.recommendations.forEach(rec => {
          html += `
            <div class="rec-row">
              <img src="${rec.poster_url || ''}" onerror="this.style.visibility='hidden'" />
              <div>
                <div class="rec-title">${escapeHtml(rec.title)} ${rec.release_year ? `(${rec.release_year})` : ''}</div>
                <div class="rec-meta">${escapeHtml(rec.media_type)}</div>
                <div class="rec-reason">${escapeHtml(rec.reason)}</div>
              </div>
            </div>
          `;
        });
      }
      content.innerHTML = html;
    } catch (err) {
      content.innerHTML = `<div class="modal-error">${escapeHtml(err.message)}</div>`;
    }
  });

  document.getElementById('modal-close-btn').addEventListener('click', () => {
    overlay.classList.remove('active');
  });

  loadWatchlist();
</script>
</body>
</html>
